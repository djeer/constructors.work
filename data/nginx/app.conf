server {
    listen 80;
    server_name constructors.work;
    location / {
        return 301 https://$host$request_uri;
    }
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
server {
    listen 443 ssl;
    server_name constructors.work;

    ssl_certificate /etc/letsencrypt/live/constructors.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/constructors.work/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://constructors.work; #for demo purposes
    }
}
